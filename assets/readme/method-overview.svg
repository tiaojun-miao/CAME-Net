<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="860" viewBox="0 0 1600 860" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="860" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#FFF9F5"/>
    </linearGradient>
    <linearGradient id="blueCard" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#EEF5FF"/>
      <stop offset="1" stop-color="#F9FBFF"/>
    </linearGradient>
    <linearGradient id="greenCard" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#F2FBF6"/>
      <stop offset="1" stop-color="#FBFDFB"/>
    </linearGradient>
    <linearGradient id="purpleCard" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#F7F3FF"/>
      <stop offset="1" stop-color="#FCFBFF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1600" height="860" rx="32" fill="url(#bg)"/>

  <text x="800" y="78" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="44" font-weight="700" fill="#111827">
    CAME-Net at a Glance
  </text>
  <text x="800" y="118" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="24" fill="#475569">
    Coordinate-stable PGA token fusion for RGB-D scene recognition
  </text>

  <rect x="110" y="166" width="1380" height="118" rx="24" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <text x="800" y="212" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#0F172A">
    Shared multivector token sequence in Cl(3,0,1)
  </text>
  <text x="275" y="252" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#1E293B">Point-cloud tokens</text>
  <text x="720" y="252" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#1E293B">Frozen image tokens</text>
  <text x="1120" y="252" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#1E293B">Constant text tokens</text>
  <g transform="translate(222,232)">
    <rect x="0" y="0" width="44" height="18" rx="6" fill="#2F6FB4"/>
    <rect x="54" y="0" width="44" height="18" rx="6" fill="#F59E0B"/>
    <rect x="108" y="0" width="44" height="18" rx="6" fill="#16A34A"/>
    <rect x="162" y="0" width="44" height="18" rx="6" fill="#DC2626"/>
    <rect x="216" y="0" width="44" height="18" rx="6" fill="#8B5CF6"/>
  </g>
  <g transform="translate(667,232)">
    <rect x="0" y="0" width="44" height="18" rx="6" fill="#2F6FB4"/>
    <rect x="54" y="0" width="44" height="18" rx="6" fill="#8B5CF6"/>
  </g>
  <g transform="translate(1087,232)">
    <rect x="0" y="0" width="44" height="18" rx="6" fill="#2F6FB4"/>
    <rect x="54" y="0" width="44" height="18" rx="6" fill="#8B5CF6"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="100" y="334" width="430" height="360" rx="28" fill="url(#blueCard)" stroke="#93C5FD" stroke-width="2"/>
    <text x="315" y="388" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700" fill="#0F172A">
      1. Point-Anchored MPE
    </text>
    <text x="315" y="422" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#334155">
      Standard PGA point anchor + learnable multivector attribute
    </text>
    <rect x="142" y="468" width="148" height="166" rx="18" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="2"/>
    <text x="216" y="510" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-style="italic" fill="#0F172A">P(pᵢ)</text>
    <text x="216" y="552" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#475569">exact PGA point</text>
    <text x="216" y="584" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#475569">anchor in grade-3</text>
    <text x="216" y="616" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#475569">motor-transformable</text>
    <text x="315" y="566" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="40" fill="#2563EB">+</text>
    <rect x="340" y="468" width="148" height="166" rx="18" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="2"/>
    <text x="414" y="510" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-style="italic" fill="#0F172A">Φθ</text>
    <text x="414" y="552" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#475569">scalar / vector /</text>
    <text x="414" y="584" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#475569">bivector / pseudoscalar</text>
    <text x="414" y="616" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#475569">local geometry + appearance</text>
    <text x="315" y="670" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#1D4ED8">
      Point tokens carry explicit geometric anchors instead of plain coordinates
    </text>
  </g>

  <g filter="url(#shadow)">
    <rect x="585" y="334" width="430" height="360" rx="28" fill="url(#greenCard)" stroke="#86EFAC" stroke-width="2"/>
    <text x="800" y="388" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700" fill="#0F172A">
      2. Geometric Clifford Attention
    </text>
    <text x="800" y="422" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#334155">
      Scalar geometric-product routing with grade-wise Q/K/V maps
    </text>
    <rect x="632" y="470" width="112" height="82" rx="16" fill="#FFFFFF" stroke="#BBF7D0" stroke-width="2"/>
    <rect x="744" y="470" width="112" height="82" rx="16" fill="#FFFFFF" stroke="#BBF7D0" stroke-width="2"/>
    <rect x="856" y="470" width="112" height="82" rx="16" fill="#FFFFFF" stroke="#BBF7D0" stroke-width="2"/>
    <text x="688" y="520" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="28" fill="#0F172A">Qᵢ</text>
    <text x="800" y="520" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="28" fill="#0F172A">Kⱼ</text>
    <text x="912" y="520" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="28" fill="#0F172A">Vⱼ</text>
    <path d="M688 552 L688 612" stroke="#0F172A" stroke-width="3"/>
    <path d="M800 552 L800 612" stroke="#0F172A" stroke-width="3"/>
    <path d="M912 552 L912 650" stroke="#0F172A" stroke-width="3"/>
    <rect x="706" y="612" width="188" height="82" rx="18" fill="#FFFFFF" stroke="#BBF7D0" stroke-width="2"/>
    <text x="800" y="648" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#0F172A">
      ⟨Qᵢ K̃ⱼ⟩₀ / √d
    </text>
    <text x="800" y="677" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#475569">
      invariant scalar routing score
    </text>
    <path d="M894 653 L954 653" stroke="#16A34A" stroke-width="3"/>
    <polygon points="954,653 939,644 939,662" fill="#16A34A"/>
    <rect x="962" y="612" width="126" height="82" rx="18" fill="#FFFFFF" stroke="#BBF7D0" stroke-width="2"/>
    <text x="1025" y="646" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#0F172A">
      softmax
    </text>
    <text x="1025" y="674" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#475569">
      scalar weights
    </text>
    <text x="800" y="732" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#166534">
      Strict invariant core in the score; approximate equivariance in the full block
    </text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1070" y="334" width="430" height="360" rx="28" fill="url(#purpleCard)" stroke="#C4B5FD" stroke-width="2"/>
    <text x="1285" y="388" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700" fill="#0F172A">
      3. GLN + Residual Alignment
    </text>
    <text x="1285" y="422" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#334155">
      Grade-aware normalization and hidden-state motor-alignment regularization
    </text>
    <rect x="1116" y="468" width="168" height="166" rx="18" fill="#FFFFFF" stroke="#DDD6FE" stroke-width="2"/>
    <text x="1200" y="506" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#0F172A">GLN</text>
    <text x="1200" y="542" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#475569">normalize each</text>
    <text x="1200" y="572" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#475569">grade separately</text>
    <rect x="1140" y="594" width="118" height="14" rx="7" fill="#2F6FB4"/>
    <rect x="1140" y="616" width="118" height="14" rx="7" fill="#16A34A"/>
    <rect x="1140" y="638" width="118" height="14" rx="7" fill="#8B5CF6"/>
    <text x="1292" y="554" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="38" fill="#7C3AED">+</text>
    <rect x="1302" y="468" width="156" height="166" rx="18" fill="#FFFFFF" stroke="#DDD6FE" stroke-width="2"/>
    <text x="1380" y="506" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#0F172A">SER / RER</text>
    <text x="1380" y="542" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#475569">sample motors</text>
    <text x="1380" y="572" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#475569">align hidden states</text>
    <text x="1380" y="602" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#475569">penalize residual drift</text>
    <path d="M1116 668 H1458" stroke="#A78BFA" stroke-width="2.5" stroke-dasharray="8 8"/>
    <text x="1285" y="708" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#6D28D9">
      Stabilizes the geometric branch under coordinate-frame perturbations
    </text>
  </g>

  <g transform="translate(110,740)">
    <rect width="1380" height="78" rx="20" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <text x="690" y="34" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#0F172A">
      Paper takeaway
    </text>
    <text x="690" y="62" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#334155">
      CAME-Net prioritizes coordinate stability and multimodal geometric compatibility, not blanket claims of exact end-to-end SE(3) equivariance.
    </text>
  </g>
</svg>
