    <text x="897" y="570" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#166534">CAME-Net</text>
    <text x="897" y="602" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#166534">Drift ↓</text>
